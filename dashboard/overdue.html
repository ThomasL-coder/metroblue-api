<!DOCTYPE html>
<html>
<head>
    <title>Overdue & Risk</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<h2>Overdue Payments & Risk</h2>
<a href="index.html"> Back to Dashboard</a>

<h3>Overdue Payments</h3>
<table id="overdueTable">
    <thead>
        <tr>
            <th>Client</th>
            <th>Amount</th>
            <th>Days Overdue</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<h3>Client Risk</h3>
<table id="riskTable">
    <thead>
        <tr>
            <th>Client</th>
            <th>Risk Level</th>
            <th>Reason</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<script defer>
let API_URL = "http://127.0.0.1:8000";
let API_KEY = sessionStorage.getItem("metroblue_api_key") || "";

async function loadConfig() {
  try {
    const res = await fetch(`${API_URL}/api/config`);
    const result = await res.json();
    if (result?.data?.api_url) API_URL = result.data.api_url;
  } catch (_) {}
}

function ensureApiKey() {
  if (!API_KEY) {
    API_KEY = window.prompt("Enter API key for MetroBlue dashboard:", "") || "";
    sessionStorage.setItem("metroblue_api_key", API_KEY);
  }
}

async function loadOverdueAndRisk() {
    try {
        const [overdueRes, riskRes] = await Promise.all([
          fetch(`${API_URL}/api/revenue/overdue`, { headers: { "X-API-KEY": API_KEY } }),
          fetch(`${API_URL}/api/clients/risk`, { headers: { "X-API-KEY": API_KEY } })
        ]);

        const overdueResult = await overdueRes.json();
        const riskResult = await riskRes.json();

        const overdueRows = Array.isArray(overdueResult?.data) ? overdueResult.data : [];
        const riskRows = Array.isArray(riskResult?.data) ? riskResult.data : [];

        const overdueTable = document.querySelector("#overdueTable tbody");
        overdueTable.innerHTML = "";
        overdueRows.forEach((item) => {
            const row = `
              <tr>
                <td>${item.client || "N/A"}</td>
                <td>${item.amount_due ?? "N/A"}</td>
                <td>${item.days_overdue ?? "N/A"}</td>
              </tr>
            `;
            overdueTable.innerHTML += row;
        });

        const riskTable = document.querySelector("#riskTable tbody");
        riskTable.innerHTML = "";
        riskRows.forEach((item) => {
            const row = `
              <tr>
                <td>${item.client || "N/A"}</td>
                <td>${item.risk_level || "N/A"}</td>
                <td>${item.reason || "N/A"}</td>
              </tr>
            `;
            riskTable.innerHTML += row;
        });

    } catch (err) {
        console.error("Overdue/risk error:", err);
    }
}

(async function init(){
  await loadConfig();
  ensureApiKey();
  await loadOverdueAndRisk();
})();
</script>

</body>
</html>
